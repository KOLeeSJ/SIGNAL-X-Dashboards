var currentSort   = { col: "name", dir: "asc" };
var currentQuery  = "";
function sortBy(col) {
  if (currentSort.col === col) {
    currentSort.dir = currentSort.dir === "asc" ? "desc" : "asc";
  } else {
    currentSort.col = col;
    currentSort.dir = "asc";
  }
  document.querySelectorAll("th[data-col]").forEach(function(th) { th.classList.remove("sort-asc", "sort-desc"); });
  var active = document.querySelector("th[data-col='" + col + "']");
  if (active) active.classList.add("sort-" + currentSort.dir);
  render();
}
function highlight(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return String(text).replace(new RegExp("(" + escaped + ")", "gi"), "<mark>$1</mark>");
}
function render() {
  var query = currentQuery.toLowerCase().trim();
  var filtered = RAW_DATA.filter(function(d) {
    if (query) {
      var haystack = (d.ticker + " " + d.name + " " + (d.market||"")).toLowerCase();
      return haystack.indexOf(query) !== -1;
    }
    return true;
  });
  filtered.sort(function(a, b) {
    var av = a[currentSort.col] != null ? a[currentSort.col] : "";
    var bv = b[currentSort.col] != null ? b[currentSort.col] : "";
    var res = (typeof av === "number" && typeof bv === "number") ? av - bv : String(av).localeCompare(String(bv), "ko");
    return currentSort.dir === "asc" ? res : -res;
  });
  var tbody = document.getElementById("tbody");
  var empty = document.getElementById("empty-state");
  if (filtered.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    tbody.innerHTML = filtered.map(function(d) {
      var hl = function(v) { return highlight(v || "\u2014", query); };
      return "<tr onclick=\"location.href='" + d.href + "'\">"
        + "<td class='ticker-cell'>" + hl(d.ticker) + "</td>"
        + "<td class='name-cell'>"   + hl(d.name)   + "</td>"
        + "<td class='market-cell'>" + hl(d.market)  + "</td>"
        + "</tr>";
    }).join("");
  }
  document.getElementById("result-count").innerHTML =
    "<span>" + filtered.length + "</span> / " + RAW_DATA.length + "\uac1c \uae30\uc5c5";
}
document.getElementById("search").addEventListener("input", function() {
  currentQuery = this.value;
  render();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
    e.preventDefault();
    document.getElementById("search").focus();
  }
  if (e.key === "Escape") {
    document.getElementById("search").value = "";
    currentQuery = "";
    render();
  }
});
render();
